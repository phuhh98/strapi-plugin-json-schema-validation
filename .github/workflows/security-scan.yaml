name: 🚨 Security Scan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: 🔒 Secret Scanning
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --results=verified
