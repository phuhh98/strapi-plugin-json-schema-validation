# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  cmd-dev-strapi:
    desc: Forward command to be executed in dev/strapi
    dir: dev/strapi
    cmds:
      - "{{.CLI_ARGS}}"

  cmd-dev-plugin:
    desc: Forward command to be executed in dev/plugin
    dir: plugin
    cmds:
      - "{{.CLI_ARGS}}"

  start-plugin-watch:
    internal: true
    desc: Start plugin watch mode
    cmds:
      - task cmd-dev-plugin -- npm run watch:link

  start-strapi-dev:
    desc: Start Strapi development environment
    cmds:
      - task cmd-dev-strapi -- npm run dev

  start-local-dev:
    desc: Start local development environment
    deps:
      - start-plugin-watch
      - start-strapi-dev
